<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <path id="topArc" d="M 30 100 A 70 70 0 0 1 170 100"/>
    <path id="bottomArc" d="M 35 105 A 65 65 0 0 0 165 105"/>
  </defs>

  <!-- Outer circle border -->
  <circle cx="100" cy="100" r="96" fill="#ffffff" stroke="#0A0A0A" stroke-width="3"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#0A0A0A" stroke-width="1.2"/>

  <!-- Top text: GRAVITY STRETCHING -->
  <text font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#0A0A0A" letter-spacing="1.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      GRAVITY STRETCHING
    </textPath>
  </text>

  <!-- Bottom text: CANGGU with dots -->
  <text font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#0A0A0A" letter-spacing="2.5">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      • CANGGU •
    </textPath>
  </text>

  <!-- Person in aerial pose (horizontal) -->
  <g fill="#0A0A0A" transform="translate(100 105)">
    <!-- head -->
    <circle cx="-30" cy="18" r="6"/>
    <!-- body / torso curving from head to hips -->
    <path d="M-26 17 Q-15 -2 4 -4 L7 4 Q-12 8 -22 22 Z"/>
    <!-- legs extended right -->
    <path d="M4 -4 L40 -18 L46 -14 L8 4 Z"/>
    <!-- arm reaching down (left side) -->
    <path d="M-28 16 L-38 28 L-34 32 L-26 20 Z"/>
  </g>
</svg>
