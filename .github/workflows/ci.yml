# Build gate: typecheck + production build on every push/PR to main.
# Before this existed (audit 2026-06-11) nothing validated a deploy — a type
# error reached production silently if nobody ran tsc by hand.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      # `next build` prerenders pages that query the DB, so give it a real
      # (empty) SQLite file with the full schema.
      - run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "file:./ci.db"
      - run: npm run build
        env:
          # Build-time only — no real secrets needed for `next build`.
          DATABASE_URL: "file:./ci.db"
          AUTH_SECRET: "ci-build-only"
          NEXTAUTH_URL: "http://localhost:3000"
