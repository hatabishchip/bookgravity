# Pings the sales-agent autopilot sweep (owner 15.07.2026).
#
# Every ~30 min the sweep auto-answers SAFE client questions in the Canggu
# inbox, backfills the RU journal translations and mines self-learning
# lessons (docs/META_agent_autopilot.md). Vercel Hobby cron is daily-only,
# so GitHub Actions does the frequent pinging - same pattern (and same
# CRON_SECRET repo secret) as today-reminders.yml.
#
# The endpoint is idempotent: one auto-reply per inbound message (the
# AgentSuggestion row is the lock), so an extra or late ping never
# double-sends. GH's scheduler can lag under load; a late sweep just
# answers a bit later.
name: agent-autopilot

on:
  schedule:
    - cron: "5,35 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit agent-autopilot cron
        run: |
          curl -fsS -m 90 https://bookgravity.com/api/cron/agent-autopilot \
            -H "User-Agent: gh-actions-agent-autopilot" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
